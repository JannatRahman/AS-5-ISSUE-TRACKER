<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- TAILWIND and DAISY UI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- FONT AWESOME -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  
  
<section>
  <div class="navbar bg-base-100 shadow-sm w-11/12 mx-auto flex justify-between h-16 px-4">

<!-- left side -->
   <div class="flex items-center gap-2">
   <img class="w-8" src="./assets/github-logo.png" alt="">
   <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>

  <!-- right side -->
  <div class="flex gap-2 items-center">
    <input type="text" placeholder="Search Issues..." class="input input-bordered  md:w-auto" />
  
        <div class="">
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
 

</div>
</section>

<section>
  <div class=" bg-base-100 shadow-sm w-11/12 mx-auto m-10 p-4 space-x-3">
    <button id="all-btn" class="btn btn-primary">All</button>
    <button id="open-btn" class="btn btn-outline">Open</button>
    <button id="closed-btn" class="btn btn-outline">Closed</button>
  </div>
</section>

<section>
 <div class="bg-base-100 shadow-sm w-11/12 mx-auto flex justify-between p-5 items-center">

   <div class="flex gap-5">
   <img class="w-15" src="./assets/Aperture.png" alt="">
   <h2 class="text-2xl font-bold">50 Issues <br><span class="text-sm font-normal">Track and manage your project issues</span></h2>
  
 
 
  </div>
   

  <div class="flex gap-5">
    <p><i class="fa-regular fa-circle bg-green-600 rounded-full cursor-pointer"></i> Open</p>
    <p><i class="fa-regular fa-circle bg-purple-600 rounded-full cursor-pointer"></i> closed</p>
  </div>

 </div>
</section>
 

<section>
  <div id="card-container" class="card w-96 bg-base-100 card-lg shadow-sm m-10 space-y-3 p-4 border-y border-green-800">

 <div class="card bg-white">

 <div class="flex justify-between p-5 ">

   <i class="fa-solid fa-spinner rounded-full bg-green-200 py-2 cursor-pointer"></i>
   <h2 class="text-red-700 bg-red-200 text-lg rounded-lg px-6 cursor-pointer">HIGH</h2>
  </div>

  <div class="">
     <h2>Fix navigation menu on mobile devices</h2>
     <p class="line-clamp-2">The navigation menu doesn't collapse properly on mobile devices...</p>
     
  </div>
  <div class="flex gap-5 ">
    <h2 class="text-red-700 bg-red-200 text-lg rounded-full px-3 font-medium cursor-pointer"><i class="fa-solid fa-bug"></i>BUG</h2>
    <h2 class="text-orange-700 bg-orange-200 text-lg rounded-lg px-3 font-medium cursor-pointer"><i class="fa-regular fa-circle-user"></i>HELP WANTED</h2>
  </div>
  <br class="">
  <div class="divider w-full"></div>
  <div class="" >
    <p>#1
     by john_doe
    </p>
    <p>1/15/2024</p>
  </div>

 </div>
</div>
</section>



<script src="./index.js"></script>
</body>
</html>
