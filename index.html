<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- TAILWIND and DAISY UI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- FONT AWESOME -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  
  <section>
       
  <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 m-5 space-y-2 text-center w-11/12 mx-auto ">
    
 <img class="mx-auto" src="./assets/github-logo.png" alt="">
      <h2 class="text-2xl">GitHub Issues Tracker</h2>
      <p>Sign in to manage your issues</p>
 
 

  <label class="label">Username</label>
  <input id="input-username" type="email" class="input" value="admin" placeholder="Enter Username" />
  <p class="text-xs text-purple-700 text-left">Default: admin</p>
<br>
  <label class="label">Password</label>
  <input id="input-password" type="password" value="admin1234" class="input" placeholder=" Enter Password" />
  <p class="text-xs text-purple-700 text-left">Default: admin123</p>

  <button id="login-btn" class="btn btn-primary mt-4">Signin</button>
</fieldset>



    
  </section>








  <script src="./form.js"></script>
</body>
</html>
