<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- TAILWIND and DAISY UI -->

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
  
  <section>
    <div class="  ">

  <label class="label">Username</label>

  <label class="label">Password</label>
  <input type="password" class="input" placeholder=" Enter Password" />

  <button id="login-btn" class="btn btn-primary mt-4">Signin</button>
</fieldset>



    </div>
  </section>




<section>
  <div class="navbar bg-base-100 shadow-sm w-11/12 mx-auto flex justify-between h-16 px-4">

<!-- left side -->
   <div class="flex items-center gap-2">

   <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>

  <!-- right side -->
  <div class="flex gap-2 items-center">
    <input type="text" placeholder="Search Issues..." class="input input-bordered  md:w-auto" />
  
        <div class="">

</div>
